<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Rat Cat Toe</title>
<style>
  /* CUSTOMIZE ME: colors, board size, fonts */
  :root {
    --bg: #12121c;
    --cell: #1b1b29;
    --border: #2a2a3c;
    --x-color: #7fd88f;
    --o-color: #f05a5a;
    --text: #ebebf5;
  }
  * { box-sizing: border-box; }
  html, body {
    margin: 0;
    height: 100%;
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 12px;
  }
  #status { font-size: 1.1rem; min-height: 1.5em; }
  #board {
    display: grid;
    grid-template-columns: repeat(3, 80px);
    grid-template-rows: repeat(3, 80px);
    gap: 6px;
  }
  .cell {
    background: var(--cell);
    border: 1px solid var(--border);
    border-radius: 8px;
    font-size: 2.5rem;
    font-weight: bold;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    user-select: none;
  }
  .cell.x { color: var(--x-color); }
  .cell.o { color: var(--o-color); }
  #reset {
    background: var(--x-color);
    color: #0c0c14;
    border: none;
    border-radius: 999px;
    padding: 8px 20px;
    font-weight: 600;
    cursor: pointer;
  }
</style>
</head>
<body>
  <div id="status">🐀 Rat's turn</div>
  <div id="board"></div>
  <button id="reset">New Game</button>

  <script>
    // Simple local two-player Rat Cat Toe. No frameworks, no build step.
    // CUSTOMIZE ME: change WIN_LINES for a bigger board, or add a computer
    // player by replacing the "O" click logic.
    const WIN_LINES = [
      [0, 1, 2], [3, 4, 5], [6, 7, 8], // rows
      [0, 3, 6], [1, 4, 7], [2, 5, 8], // columns
      [0, 4, 8], [2, 4, 6],           // diagonals
    ];

    const FACES = { X: "🐀", O: "🐱" };
    const NAMES = { X: "Rat", O: "Cat" };

    let board = Array(9).fill(null);
    let current = "X";
    let gameOver = false;

    const boardEl = document.getElementById("board");
    const statusEl = document.getElementById("status");
    const resetEl = document.getElementById("reset");

    function checkWinner() {
      for (const [a, b, c] of WIN_LINES) {
        if (board[a] && board[a] === board[b] && board[a] === board[c]) {
          return { winner: board[a], line: [a, b, c] };
        }
      }
      if (board.every((cell) => cell !== null)) {
        return { winner: "draw", line: [] };
      }
      return null;
    }

    function render() {
      boardEl.innerHTML = "";
      board.forEach((value, i) => {
        const cellEl = document.createElement("div");
        cellEl.className = "cell" + (value ? " " + value.toLowerCase() : "");
        cellEl.textContent = value ? FACES[value] : "";
        cellEl.addEventListener("click", () => handleClick(i));
        boardEl.appendChild(cellEl);
      });
    }

    function handleClick(i) {
      if (gameOver || board[i]) return;
      board[i] = current;
      const result = checkWinner();
      render();
      if (result) {
        gameOver = true;
        statusEl.textContent =
          result.winner === "draw"
            ? "It's a draw!"
            : `${FACES[result.winner]} ${NAMES[result.winner]} wins!`;
        return;
      }
      current = current === "X" ? "O" : "X";
      statusEl.textContent = `${FACES[current]} ${NAMES[current]}'s turn`;
    }

    resetEl.addEventListener("click", () => {
      board = Array(9).fill(null);
      current = "X";
      gameOver = false;
      statusEl.textContent = `${FACES[current]} ${NAMES[current]}'s turn`;
      render();
    });

    render();
  </script>
</body>
</html>
